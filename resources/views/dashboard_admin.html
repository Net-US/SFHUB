      function initActiveCharts() {
        const dailyCtx = document.getElementById("dailyActiveChart");
        if (dailyCtx) {
          new Chart(dailyCtx.getContext("2d"), {
            type: "line",
            data: {
              labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
              datasets: [{
                data: adminData.analytics.dailyActiveUsers,
                borderColor: "#f57223",
                backgroundColor: "rgba(245, 114, 35, 0.1)",
                fill: true,
                tension: 0.4,
                pointRadius: 2,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: { y: { beginAtZero: true } }

        const weeklyCtx = document.getElementById("weeklyActiveChart");

      function initTaskCompletionChart() {

        new Chart(ctx.getContext("2d"), {

              label: "Tasks Completed",

          options: {
            responsive: true,

            scales: {
              y: { beginAtZero: true }
            }
          }
        });
