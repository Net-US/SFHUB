      body {

      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d6d3d1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a29e;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #4b5563;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }

      /* Sidebar Transitions */
      .sidebar-transition {
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .nav-text {
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
        white-space: nowrap;
        opacity: 1;
      }

      .sidebar-collapsed .nav-text {
        opacity: 0;
        transform: translateX(-10px);
        pointer-events: none;
        display: none;
      }

      .sidebar-collapsed .nav-header {
        display: none;
      }

      .sidebar-collapsed .logo-text {
        display: none;
      }

      .sidebar-collapsed .nav-item {
        justify-content: center;
        padding-left: 0;
        padding-right: 0;
      }

      .sidebar-collapsed .nav-item i {
        margin-right: 0;
      }

      /* Chart Container */
      .chart-container {
        position: relative;
        width: 100%;
        max-width: 100%;
        height: 300px;
        max-height: 400px;
        margin: 0 auto;
      }

      /* Animation for content */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.5s ease-out;
      }

      /* Profit/Loss colors */
      .profit {
        color: #10b981;
      }
      .loss {
        color: #ef4444;
      }
    </style>

      const themeToggleBtn = document.getElementById("theme-toggle");
      themeToggleBtn.addEventListener("click", function () {
        const darkIcon = document.getElementById("theme-toggle-dark-icon");
        const lightIcon = document.getElementById("theme-toggle-light-icon");

        darkIcon.classList.toggle("hidden");
        lightIcon.classList.toggle("hidden");

        if (localStorage.getItem("color-theme")) {
          if (localStorage.getItem("color-theme") === "light") {
            document.documentElement.classList.add("dark");
            localStorage.setItem("color-theme", "dark");
          } else {
            document.documentElement.classList.remove("dark");
            localStorage.setItem("color-theme", "light");
          }
        } else {
          if (document.documentElement.classList.contains("dark")) {
            document.documentElement.classList.remove("dark");
            localStorage.setItem("color-theme", "light");
          } else {
            document.documentElement.classList.add("dark");
            localStorage.setItem("color-theme", "dark");
          }
        }
      });

      function formatCurrency(amount) {
        return amount.toLocaleString("id-ID");
      }

      function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString("id-ID", { day: "numeric", month: "long", year: "numeric" });
      }

      function formatDateShort(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString("id-ID", { day: "numeric", month: "short" });
      }

      function calculateDaysRemaining(targetDateString) {
        const targetDate = new Date(targetDateString);
        const today = new Date();
        const diffTime = targetDate - today;
        return Math.max(Math.ceil(diffTime / (1000 * 60 * 60 * 24)), 0);
      }

      function generateCalendarDays() {
        const container = document.getElementById("calendar-days");
        if (!container) return;

        const month = 1; // February
        const year = 2024;

        // Update month display
        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        document.getElementById("calendar-month-display").textContent = `${monthNames[month]} ${year}`;

        // Get first day of month and number of days
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // Adjust for Sunday first (0 = Sunday)
        const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1;

        container.innerHTML = "";

        // Empty cells for days before the first day
        for (let i = 0; i < adjustedFirstDay; i++) {
          const emptyCell = document.createElement("div");
          emptyCell.className = "p-2 h-24 border border-stone-100 dark:border-stone-800 rounded-lg bg-stone-50/50 dark:bg-stone-800/50";
          container.appendChild(emptyCell);
        }

        // Actual days of the month
        for (let day = 1; day <= daysInMonth; day++) {
          const dayCell = document.createElement("div");
          dayCell.className = "calendar-day p-2 h-24 border border-stone-200 dark:border-stone-700 rounded-lg bg-white dark:bg-stone-800 hover:bg-stone-50 dark:hover:bg-stone-700 cursor-pointer";

          // Format date for event checking
          const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

          // Find events for this day
          const dayEvents = appData.smartCalendar.events.filter((event) => event.date === dateStr);

          let eventsHtml = "";
          dayEvents.forEach((event) => {
            eventsHtml += `<div class="text-xs ${event.color} text-white p-1 rounded mb-1 truncate">${event.title}</div>`;
          });

          dayCell.innerHTML = `
                    <div class="font-bold text-stone-800 dark:text-white">${day}</div>
                    <div class="mt-1 overflow-y-auto h-16">${eventsHtml}</div>
                `;

          dayCell.onclick = () => showDayDetails(dateStr, dayEvents);
          container.appendChild(dayCell);
        }
      }

      function showDayDetails(dateStr, events) {
        const dateObj = new Date(dateStr);
        const options = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
        const formattedDate = dateObj.toLocaleDateString("id-ID", options);

        let eventsHtml = "";
        if (events.length > 0) {
          eventsHtml = events
            .map(
              (event) => `
                    <div class="p-3 rounded-lg border ${event.color.replace("bg-", "border-").replace("500", "200")} ${event.color} bg-opacity-10 mb-2">
                        <div class="font-medium">${event.title}</div>
                        <div class="text-sm text-stone-600 dark:text-stone-400">${event.type.charAt(0).toUpperCase() + event.type.slice(1)}</div>

            )
            .join("");
        } else {
          eventsHtml = '<p class="text-stone-500 dark:text-stone-400 text-center py-4">Tidak ada jadwal untuk hari ini.</p>';
        }

        alert(
          `
Detail Hari: ${formattedDate}

${events.length > 0 ? "Jadwal:" : ""}
${events.map((e) => `• ${e.title} (${e.type})`).join("\n")}

${events.length === 0 ? "Hari ini bebas untuk mengerjakan tugas yang tertunda atau istirahat." : ""}

      function populateUpcomingEvents() {
        const container = document.getElementById("upcoming-events");
        if (!container) return;

        // Sort events by date
        const sortedEvents = [...appData.smartCalendar.events].sort((a, b) => new Date(a.date) - new Date(b.date));

        // Get today's date
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        // Filter upcoming events (next 14 days)
        const upcoming = sortedEvents.filter((event) => {
          const eventDate = new Date(event.date);
          const diffTime = eventDate - today;
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          return diffDays >= 0 && diffDays <= 14;
        });

        container.innerHTML = "";

        if (upcoming.length === 0) {
          container.innerHTML = '<p class="text-stone-500 dark:text-stone-400 text-center py-4">Tidak ada deadline dalam 14 hari ke depan.</p>';
          return;
        }

        upcoming.forEach((event) => {
          const eventDate = new Date(event.date);
          const diffTime = eventDate - today;
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

          const eventEl = document.createElement("div");
          eventEl.className = "flex items-start p-3 border border-stone-200 dark:border-stone-700 rounded-lg hover:bg-stone-50 dark:hover:bg-stone-800";
          eventEl.innerHTML = `
                    <div class="${event.color} w-3 h-3 rounded-full mt-1 mr-3 flex-shrink-0"></div>
                    <div class="flex-1">
                        <div class="font-medium text-stone-800 dark:text-white">${event.title}</div>
                        <div class="text-xs text-stone-500 dark:text-stone-400">
                            ${eventDate.toLocaleDateString("id-ID", { day: "numeric", month: "short" })} 
                            • ${diffDays === 0 ? "Hari ini!" : diffDays === 1 ? "Besok" : `${diffDays} hari lagi`}
                        </div>
                    </div>
                `;
          container.appendChild(eventEl);
        });
      }

      function calculateCompletionRate() {
        const weekly = appData.productivityData.weekly;
        let totalCompleted = 0;
        let totalPlanned = 0;

        weekly.forEach((day) => {
          totalCompleted += day.tasksCompleted;
          totalPlanned += day.tasksPlanned;
        });

        return totalPlanned > 0 ? Math.round((totalCompleted / totalPlanned) * 100) : 0;
      }

      function calculateAverageFocusScore() {
        const weekly = appData.productivityData.weekly;
        const total = weekly.reduce((sum, day) => sum + day.focusScore, 0);
        return Math.round(total / weekly.length);
      }

      function calculatePeakProductivityDay() {
        const weekly = appData.productivityData.weekly;
        let peakDay = weekly[0];

        weekly.forEach((day) => {
          if (day.focusScore > peakDay.focusScore) {
            peakDay = day;
          }
        });

        // Find day name
        const days = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu", "Minggu"];
        const index = appData.productivityData.weekly.indexOf(peakDay);
        return days[index] || "Kamis";
      }

      function calculateGeneralCompletionRate() {
        const completed = appData.generalTasks.filter((task) => task.completed).length;
        const total = appData.generalTasks.length;
        return total > 0 ? Math.round((completed / total) * 100) : 0;
      }

      function countTasksByCategory() {
        const categories = new Set(appData.generalTasks.map((task) => task.category));
        return categories.size;
      }

      function populateGeneralTasks(filter = "all") {
        const container = document.getElementById("general-tasks-list");
        if (!container) return;

        let filteredTasks = [...appData.generalTasks];

        // Apply filter
        if (filter === "completed") {
          filteredTasks = filteredTasks.filter((task) => task.completed);
        } else if (filter === "pending") {
          filteredTasks = filteredTasks.filter((task) => !task.completed);
        } else if (filter === "today") {
          const today = new Date().toISOString().split("T")[0];
          filteredTasks = filteredTasks.filter((task) => task.date === today);
        }

        // Sort by date and completion status
        filteredTasks.sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          return new Date(a.date) - new Date(b.date);
        });

        container.innerHTML = "";

        if (filteredTasks.length === 0) {
          container.innerHTML = `
                    <div class="text-center py-8 text-stone-500 dark:text-stone-400">
                        <i class="fa-solid fa-clipboard-list text-3xl mb-2"></i>
                        <p>Tidak ada tugas yang sesuai filter.</p>
                    </div>
                `;
          return;
        }

        filteredTasks.forEach((task) => {
          const taskDate = new Date(task.date);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const taskDateObj = new Date(task.date);
          taskDateObj.setHours(0, 0, 0, 0);

          let dateText = taskDate.toLocaleDateString("id-ID", { day: "numeric", month: "short" });
          let dateClass = "text-stone-500 dark:text-stone-400";

          if (taskDateObj.getTime() === today.getTime()) {
            dateText = "Hari ini";
            dateClass = "text-rose-600 dark:text-rose-400 font-medium";
          } else if (taskDateObj < today && !task.completed) {
            dateClass = "text-red-500 dark:text-red-400 font-medium";
          }

          const taskEl = document.createElement("div");
          taskEl.className = `flex items-center p-4 border border-stone-200 dark:border-stone-700 rounded-lg hover:shadow-sm transition-shadow ${task.completed ? "bg-stone-50 dark:bg-stone-800 opacity-75" : "bg-white dark:bg-stone-800"}`;
          taskEl.innerHTML = `
                    <button onclick="toggleGeneralTaskCompletion(${task.id})" class="mr-3 focus:outline-none">
                        <div class="w-6 h-6 rounded-full border-2 ${task.completed ? "bg-emerald-500 border-emerald-500" : "border-stone-300 dark:border-stone-600"} flex items-center justify-center">
                            ${task.completed ? '<i class="fa-solid fa-check text-white text-xs"></i>' : ""}
                        </div>
                    </button>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="font-medium text-stone-800 dark:text-white ${task.completed ? "line-through" : ""}">${task.title}</h4>
                            <span class="text-xs ${dateClass}">${dateText}</span>
                        </div>
                        <div class="flex items-center mt-1">
                            <span class="text-xs px-2 py-0.5 rounded-full bg-stone-100 dark:bg-stone-700 text-stone-600 dark:text-stone-300 mr-2">${task.category}</span>
                            <span class="text-xs text-stone-500 dark:text-stone-400"><i class="fa-regular fa-clock mr-1"></i>${task.timeEstimate}</span>
                        </div>
                    </div>
                `;
          container.appendChild(taskEl);
        });
      }

      function toggleGeneralTaskCompletion(taskId) {
        const task = appData.generalTasks.find((t) => t.id === taskId);
        if (task) {

          populateGeneralTasks();

      function populateCategoryStats() {
        const container = document.getElementById("category-stats");
        if (!container) return;

        // Calculate stats per category
        const categories = {};
        appData.generalTasks.forEach((task) => {
          if (!categories[task.category]) {
            categories[task.category] = { total: 0, completed: 0 };
          }
          categories[task.category].total++;
          if (task.completed) categories[task.category].completed++;
        });

        container.innerHTML = "";

        Object.entries(categories).forEach(([category, stats]) => {
          const completionRate = Math.round((stats.completed / stats.total) * 100);

          const statEl = document.createElement("div");
          statEl.className = "space-y-2";
          statEl.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-medium text-stone-700 dark:text-stone-300">${category}</span>
                        <span class="text-sm font-bold text-stone-800 dark:text-white">${completionRate}%</span>

                    <div class="w-full bg-stone-200 dark:bg-stone-700 rounded-full h-2">

                    <div class="text-xs text-stone-500 dark:text-stone-400">${stats.completed}/${stats.total} tugas selesai</div>

          container.appendChild(statEl);

        if (!titleInput.value.trim()) {

        const newId = Math.max(...appData.generalTasks.map((t) => t.id)) + 1;

        appData.generalTasks.push({
          id: newId,
          title: titleInput.value,

      function calculateTotalAssets() {
        const finance = appData.financeData;
        let total = finance.assets.cash;

        finance.assets.bank.forEach((b) => (total += b.balance));
        finance.assets.wallet.forEach((w) => (total += w.balance));
        finance.assets.investments.forEach((i) => (total += i.value));

        return total;
      }

      function calculateTotalDebts() {
        return appData.financeData.assets.debts.reduce((sum, debt) => sum + debt.amount, 0);
      }

      function calculateNetWorth() {
        return calculateTotalAssets() - calculateTotalDebts();
      }

      function calculateAvailableMoney() {
        const finance = appData.financeData;
        let available = finance.assets.cash;

        finance.assets.bank.forEach((b) => (available += b.balance));
        finance.assets.wallet.forEach((w) => (available += w.balance));

        // Subtract monthly expenses and savings
        const monthlyExpense = finance.monthlyTargets.expenseLimit;
        const monthlySavings = finance.monthlyTargets.savingsTarget;

        return available - monthlyExpense - monthlySavings;
      }

      function initFinanceAssetDistributionChart() {
        const ctx = document.getElementById("assetDistributionChart");
        if (!ctx) return;

        const finance = appData.financeData;
        const cash = finance.assets.cash;
        const bank = finance.assets.bank.reduce((sum, b) => sum + b.balance, 0);
        const wallet = finance.assets.wallet.reduce((sum, w) => sum + w.balance, 0);
        const investments = finance.assets.investments.reduce((sum, i) => sum + i.value, 0);
        const debts = finance.assets.debts.reduce((sum, d) => sum + d.amount, 0);

        new Chart(ctx.getContext("2d"), {
          type: "doughnut",
          data: {
            labels: ["Cash", "Bank", "E-Wallet", "Investasi", "Hutang"],
            datasets: [
              {
                data: [cash, bank, wallet, investments, debts],
                backgroundColor: ["#f59e0b", "#3b82f6", "#8b5cf6", "#10b981", "#ef4444"],
                borderWidth: 2,
                borderColor: "#fff",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: "bottom",
              },
              tooltip: {
                callbacks: {
                  label: function (context) {
                    const label = context.label || "";
                    const value = context.raw || 0;
                    const total = cash + bank + wallet + investments + debts;
                    const percentage = Math.round((value / total) * 100);
                    return `${label}: Rp ${formatCurrency(value)} (${percentage}%)`;
                  },
                },
              },
            },
          },
        });
      }

      function initAssetDistributionChart() {

        if (!ctx) return;

        const cash = calculateTotalCash();
        const bank = calculateTotalBank();
        const wallet = calculateTotalWallet();
        const other = calculateTotalOtherAssets();

        new Chart(ctx.getContext("2d"), {
          type: "doughnut",
          data: {
            labels: ["Cash", "Bank", "E-Wallet", "Aset Lain"],
            datasets: [
              {
                data: [cash, bank, wallet, other],
                backgroundColor: ["#f59e0b", "#3b82f6", "#8b5cf6", "#10b981"],
                borderWidth: 2,
                borderColor: "#fff",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: "bottom",
              },
              tooltip: {
                callbacks: {
                  label: function (context) {
                    const label = context.label || "";
                    const value = context.raw || 0;
                    const total = cash + bank + wallet + other;
                    const percentage = Math.round((value / total) * 100);
                    return `${label}: Rp ${formatCurrency(value)} (${percentage}%)`;
                  },
                },
              },
            },
          },
        });
      }

      function renderDebtList() {
        const debts = appData.debtData.debts;

        if (debts.length === 0) {
          return '<p class="text-center py-8 text-stone-500 dark:text-stone-400">Tidak ada hutang</p>';
        }

        return debts
          .map((debt) => {
            const daysLeft = calculateDaysRemaining(debt.dueDate);
            let statusClass = "bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300";
            let statusText = "Pending";

            if (debt.status === "active") {
              statusClass = "bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-300";
              statusText = "Aktif";
            } else if (debt.status === "overdue") {
              statusClass = "bg-rose-100 dark:bg-rose-900/30 text-rose-800 dark:text-rose-300";
              statusText = "Jatuh Tempo";
            }

            const totalPaid = debt.payments.reduce((sum, payment) => sum + payment.amount, 0);
            const remaining = debt.amount - totalPaid;
            const progress = (totalPaid / debt.amount) * 100;

            return `
            <div class="p-4 border border-stone-200 dark:border-stone-700 rounded-xl">
              <div class="flex justify-between items-start mb-2">
                <div>
                  <h4 class="font-bold text-stone-800 dark:text-white">${debt.debtor}</h4>
                  <p class="text-sm text-stone-500 dark:text-stone-400">${debt.description}</p>
                </div>
                <span class="px-2 py-1 rounded-full text-xs font-medium ${statusClass}">${statusText}</span>
              </div>
              
              <div class="mb-3">
                <p class="text-lg font-bold text-stone-800 dark:text-white">Rp ${formatCurrency(debt.amount)}</p>
                ${debt.interest > 0 ? `<p class="text-xs text-rose-600 dark:text-rose-400">Bunga: ${debt.interest}%</p>` : ""}
              </div>
              
              <div class="w-full bg-stone-200 dark:bg-stone-700 rounded-full h-2 mb-2">
                <div class="bg-emerald-500 h-2 rounded-full" style="width: ${progress}%"></div>
              </div>
              
              <div class="flex justify-between text-xs text-stone-500 dark:text-stone-400">
                <span>Terkumpul: Rp ${formatCurrency(totalPaid)}</span>
                <span>Sisa: Rp ${formatCurrency(remaining)}</span>

              <div class="flex justify-between text-sm mt-3">
                <div>
                  <p class="text-stone-500 dark:text-stone-400">Jatuh Tempo</p>
                  <p class="font-medium ${daysLeft <= 7 ? "text-rose-600 dark:text-rose-400" : "text-stone-800 dark:text-white"}">

                </div>

                  <p class="text-stone-500 dark:text-stone-400">Mulai</p>
                  <p class="font-medium text-stone-800 dark:text-white">${formatDateShort(debt.createdAt)}</p>
                </div>
              </div>
            </div>
          `;
          })
          .join("");
      }

      function renderPaymentHistory() {
        const allPayments = [];
        appData.debtData.debts.forEach((debt) => {
          debt.payments.forEach((payment) => {
            allPayments.push({
              ...payment,
              debtor: debt.debtor,
              debtId: debt.id,
            });
          });
        });

        // Sort by date descending
        const sortedPayments = allPayments.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

        if (sortedPayments.length === 0) {
          return '<tr><td colspan="4" class="text-center py-4 text-stone-500 dark:text-stone-400">Belum ada riwayat pembayaran</td></tr>';
        }

        return sortedPayments
          .map(
            (payment) => `
            <tr class="border-b border-stone-100 dark:border-stone-800 hover:bg-stone-50 dark:hover:bg-stone-800">
              <td class="py-3">${formatDateShort(payment.date)}</td>
              <td class="py-3 font-medium text-stone-800 dark:text-white">${payment.debtor}</td>
              <td class="py-3 font-bold text-emerald-600 dark:text-emerald-400">Rp ${formatCurrency(payment.amount)}</td>
              <td class="py-3">
                <span class="px-2 py-1 rounded-full text-xs bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-300">
                  Dibayar
                </span>
              </td>
            </tr>
          `,
          )
          .join("");
      }

      function renderUpcomingPayments() {
        const upcoming = appData.debtData.debts
          .filter((debt) => debt.status !== "paid")
          .sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate))
          .slice(0, 3);

        if (upcoming.length === 0) {
          return '<p class="text-center py-4 text-stone-500 dark:text-stone-400">Tidak ada pembayaran mendatang</p>';
        }

        return upcoming
          .map((debt) => {
            const daysLeft = calculateDaysRemaining(debt.dueDate);
            const totalPaid = debt.payments.reduce((sum, payment) => sum + payment.amount, 0);
            const remaining = debt.amount - totalPaid;

            return `
            <div class="p-3 border border-stone-200 dark:border-stone-700 rounded-lg">
              <div class="flex justify-between items-start mb-2">
                <div>
                  <h4 class="font-medium text-stone-800 dark:text-white text-sm">${debt.debtor}</h4>
                  <p class="text-xs text-stone-500 dark:text-stone-400">${formatDateShort(debt.dueDate)}</p>
                </div>
                <span class="text-xs font-bold ${daysLeft <= 7 ? "text-rose-600 dark:text-rose-400" : "text-amber-600 dark:text-amber-400"}">
                  ${daysLeft} hari
                </span>
              </div>
              
              <div class="flex justify-between text-sm">
                <div>
                  <p class="text-xs text-stone-500 dark:text-stone-400">Sisa</p>
                  <p class="font-bold text-stone-800 dark:text-white">Rp ${formatCurrency(remaining)}</p>
                </div>
                <div class="text-right">
                  <p class="text-xs text-stone-500 dark:text-stone-400">Total</p>
                  <p class="font-bold text-stone-800 dark:text-white">Rp ${formatCurrency(debt.amount)}</p>
                </div>
              </div>
            </div>
          `;
          })
          .join("");
      }

      function addPayment() {
        const debtId = parseInt(document.getElementById("debt-select").value);
        const amount = parseInt(document.getElementById("payment-amount").value);
        const date = document.getElementById("payment-date").value;

        if (!debtId || !amount || amount <= 0) {
          alert("Harap isi semua field dengan benar");
          return;
        }

        const debt = appData.debtData.debts.find((d) => d.id === debtId);
        if (!debt) return;

        debt.payments.push({
          date: date,
          amount: amount,
        });

        // Update totals
        appData.debtData.totalPaid += amount;
        appData.debtData.totalRemaining -= amount;

        // Refresh view
        navigateTo("debts");

        // Show notification
        const notification = document.createElement("div");
        notification.className = "fixed bottom-4 right-4 bg-emerald-500 text-white px-4 py-2 rounded-lg shadow-lg z-50";
        notification.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Pembayaran berhasil dicatat!';
        document.body.appendChild(notification);

        setTimeout(() => notification.remove(), 3000);
      }

                </div>

                <!-- Investment Performance Chart -->
                <div class="bg-white dark:bg-stone-900 rounded-2xl p-6 shadow-sm border border-stone-200 dark:border-stone-800 mt-6">
                  <h3 class="font-bold text-stone-800 dark:text-white mb-6">Performance by Instrument</h3>
                  <div class="h-64">
                    <canvas id="investmentChart"></canvas>
                  </div>
                </div>
              </div>

              <!-- Right Column -->
              <div class="space-y-6">
                <!-- Add Investment -->
                <div class="bg-white dark:bg-stone-900 rounded-2xl p-6 shadow-sm border border-stone-200 dark:border-stone-800">
                  <h3 class="font-bold text-stone-800 dark:text-white mb-4">Tambah Investasi</h3>
                  <div class="space-y-3">
                    <div>
                      <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">Nama Instrumen</label>
                      <input type="text" id="investment-name" class="w-full border border-stone-300 dark:border-stone-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:bg-stone-800 dark:text-white" placeholder="Contoh: Bitcoin (BTC)">
                    </div>
                    <div>
                      <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">Tipe</label>
                      <select id="investment-type" class="w-full border border-stone-300 dark:border-stone-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:bg-stone-800 dark:text-white">
                        <option value="crypto">Cryptocurrency</option>
                        <option value="stocks">Saham</option>
                        <option value="mutual-fund">Reksadana</option>
                        <option value="gold">Emas</option>
                        <option value="other">Lainnya</option>
                      </select>
                    </div>
                    <button onclick="showAddInvestmentModal()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg font-medium transition-colors">
                      <i class="fa-solid fa-plus mr-2"></i>Tambah Instrumen
                    </button>
                  </div>
                </div>

                <!-- Add Purchase -->
                <div class="bg-white dark:bg-stone-900 rounded-2xl p-6 shadow-sm border border-stone-200 dark:border-stone-800">
                  <h3 class="font-bold text-stone-800 dark:text-white mb-4">Tambah Pembelian</h3>
                  <div class="space-y-3">
                    <div>
                      <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">Pilih Instrumen</label>
                      <select id="instrument-select" class="w-full border border-stone-300 dark:border-stone-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:bg-stone-800 dark:text-white">
                        <option value="">Pilih instrumen</option>
                        ${invData.instruments
                          .map(
                            (inv) => `
                          <option value="${inv.id}">${inv.name} (${inv.symbol})</option>
                        `,
                          )
                          .join("")}
                      </select>
                    </div>
                    <div>
                      <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">Jumlah (Rp)</label>
                      <input type="number" id="purchase-amount" class="w-full border border-stone-300 dark:border-stone-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:bg-stone-800 dark:text-white" placeholder="0">
                    </div>
                    <div>
                      <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1">Tanggal Beli</label>
                      <input type="date" id="purchase-date" class="w-full border border-stone-300 dark:border-stone-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:bg-stone-800 dark:text-white" value="${new Date().toISOString().split("T")[0]}">
                    </div>
                    <button onclick="addPurchase()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-medium transition-colors">
                      <i class="fa-solid fa-cart-plus mr-2"></i>Tambah Pembelian
                    </button>
                  </div>
                </div>

                <!-- Quick Stats -->
                <div class="bg-white dark:bg-stone-900 rounded-2xl p-6 shadow-sm border border-stone-200 dark:border-stone-800">
                  <h3 class="font-bold text-stone-800 dark:text-white mb-4">Statistik Cepat</h3>
                  <div class="space-y-4">
                    <div>
                      <p class="text-sm text-stone-500 dark:text-stone-400 mb-1">Best Performer</p>
                      <div class="flex items-center">
                        <div class="w-8 h-8 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center mr-2">
                          <i class="fa-solid fa-trophy text-emerald-600 dark:text-emerald-400 text-xs"></i>
                        </div>
                        <div>
                          <p class="font-bold text-stone-800 dark:text-white">Bitcoin (BTC)</p>
                          <p class="text-xs text-emerald-600 dark:text-emerald-400">+75% • Rp 1.5M</p>
                        </div>
                      </div>
                    </div>
                    
                    <div>
                      <p class="text-sm text-stone-500 dark:text-stone-400 mb-1">Worst Performer</p>
                      <div class="flex items-center">
                        <div class="w-8 h-8 rounded-full bg-rose-100 dark:bg-rose-900/30 flex items-center justify-center mr-2">
                          <i class="fa-solid fa-arrow-trend-down text-rose-600 dark:text-rose-400 text-xs"></i>
                        </div>
                        <div>
                          <p class="font-bold text-stone-800 dark:text-white">Saham GOTO</p>
                          <p class="text-xs text-rose-600 dark:text-rose-400">-10% • Rp -300k</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;

        // Initialize chart
        setTimeout(() => {
          initInvestmentChart();
        }, 100);
      }

      function renderInvestmentList(filter = "all") {
        let instruments = appData.investmentData.instruments;

        if (filter !== "all") {
          instruments = instruments.filter((inv) => inv.type === filter);
        }

        if (instruments.length === 0) {
          return '<p class="text-center py-8 text-stone-500 dark:text-stone-400">Belum ada instrumen investasi</p>';
        }

        return instruments
          .map(
            (instrument) => `
            <div class="bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-xl p-4 hover:shadow-md transition-shadow cursor-pointer" onclick="showInvestmentDetail(${instrument.id})">
              <div class="flex justify-between items-start mb-3">
                <div class="flex items-center">
                  <div class="w-10 h-10 rounded-full ${instrument.type === "crypto" ? "bg-orange-100 dark:bg-orange-900/30" : "bg-blue-100 dark:bg-blue-900/30"} flex items-center justify-center mr-3">
                    <i class="fa-solid ${instrument.type === "crypto" ? "fa-bitcoin-sign text-orange-600 dark:text-orange-400" : "fa-chart-column text-blue-600 dark:text-blue-400"}"></i>
                  </div>
                  <div>
                    <h4 class="font-bold text-stone-800 dark:text-white">${instrument.name}</h4>
                    <p class="text-xs text-stone-500 dark:text-stone-400">${instrument.symbol} • ${instrument.type === "crypto" ? "Crypto" : "Saham"}</p>
                  </div>
                </div>
                <span class="text-xs font-bold ${instrument.profitLoss >= 0 ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400"}">
                  ${instrument.profitLossPercentage >= 0 ? "+" : ""}${instrument.profitLossPercentage}%
                </span>
              </div>
              
              <div class="grid grid-cols-2 gap-3 text-sm">
                <div>
                  <p class="text-xs text-stone-500 dark:text-stone-400">Modal</p>
                  <p class="font-bold text-stone-800 dark:text-white">Rp ${formatCurrency(instrument.totalInvested)}</p>
                </div>
                <div>
                  <p class="text-xs text-stone-500 dark:text-stone-400">Nilai Sekarang</p>
                  <p class="font-bold text-stone-800 dark:text-white">Rp ${formatCurrency(instrument.currentValue)}</p>
                </div>
              </div>
              
              <div class="mt-3 flex justify-between text-xs text-stone-500 dark:text-stone-400">
                <span><i class="fa-solid fa-calendar-day mr-1"></i> ${instrument.purchases.length} pembelian</span>
                <span><i class="fa-solid fa-eye mr-1"></i> Klik untuk detail</span>
              </div>
            </div>
          `,
          )
          .join("");
      }

      function filterInstruments(type) {
        document.getElementById("investment-list").innerHTML = renderInvestmentList(type);
      }

      function showInvestmentDetail(instrumentId) {
        const instrument = appData.investmentData.instruments.find((inv) => inv.id === instrumentId);
        if (!instrument) return;

        // Hitung detail dari purchases
        const totalPurchases = instrument.purchases.reduce((sum, p) => sum + p.amount, 0);
        const totalQuantity = instrument.purchases.reduce((sum, p) => sum + p.quantity, 0);
        const averagePrice = totalQuantity > 0 ? totalPurchases / totalQuantity : 0;

        const modal = document.createElement("div");
        modal.className = "fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4";
        modal.innerHTML = `
          <div class="bg-white dark:bg-stone-900 rounded-2xl p-6 w-full max-w-4xl max-h-[90vh] overflow-y-auto shadow-xl">
            <div class="flex justify-between items-start mb-6">
              <div>
                <h3 class="text-xl font-bold text-stone-900 dark:text-white">Detail Investasi: ${instrument.name}</h3>
                <p class="text-stone-500 dark:text-stone-400">${instrument.symbol} • ${instrument.type === "crypto" ? "Cryptocurrency" : "Saham"}</p>
              </div>
              <button onclick="this.parentElement.parentElement.parentElement.remove()" class="text-stone-500 hover:text-stone-800 dark:hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
              </button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
              <!-- Investment Summary -->
              <div class="lg:col-span-2 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                  <div class="p-4 bg-stone-50 dark:bg-stone-800 rounded-xl">
                    <p class="text-sm text-stone-500 dark:text-stone-400">Total Modal</p>
                    <p class="text-xl font-bold text-stone-800 dark:text-white">Rp ${formatCurrency(instrument.totalInvested)}</p>
                  </div>
                  <div class="p-4 bg-stone-50 dark:bg-stone-800 rounded-xl">
                    <p class="text-sm text-stone-500 dark:text-stone-400">Nilai Saat Ini</p>
                    <p class="text-xl font-bold text-stone-800 dark:text-white">Rp ${formatCurrency(instrument.currentValue)}</p>
                  </div>
                  <div class="p-4 ${instrument.profitLoss >= 0 ? "bg-emerald-50 dark:bg-emerald-900/20" : "bg-rose-50 dark:bg-rose-900/20"} rounded-xl">
                    <p class="text-sm text-stone-500 dark:text-stone-400">Profit/Loss</p>
                    <p class="text-xl font-bold ${instrument.profitLoss >= 0 ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400"}">${instrument.profitLoss >= 0 ? "+" : ""}Rp ${formatCurrency(Math.abs(instrument.profitLoss))}</p>
                    <p class="text-sm ${instrument.profitLoss >= 0 ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400"}">${instrument.profitLossPercentage >= 0 ? "+" : ""}${instrument.profitLossPercentage}%</p>
                  </div>
                  <div class="p-4 bg-stone-50 dark:bg-stone-800 rounded-xl">
                    <p class="text-sm text-stone-500 dark:text-stone-400">Total Unit</p>
                    <p class="text-xl font-bold text-stone-800 dark:text-white">${totalQuantity} ${instrument.symbol}</p>
                  </div>
                </div>
                
                <!-- Price Information -->
                <div class="p-4 bg-stone-50 dark:bg-stone-800 rounded-xl">
                  <h4 class="font-bold text-stone-800 dark:text-white mb-3">Informasi Harga</h4>
                  <div class="grid grid-cols-2 gap-3">
                    <div>
                      <p class="text-sm text-stone-500 dark:text-stone-400">Harga Rata-rata Beli</p>
                      <p class="font-bold text-stone-800 dark:text-white">Rp ${formatCurrency(averagePrice)}</p>
                    </div>
                    <div>
                      <p class="text-sm text-stone-500 dark:text-stone-400">Harga Saat Ini</p>
                      <p class="font-bold text-stone-800 dark:text-white">Rp ${formatCurrency(instrument.currentPrice)}</p>
                    </div>
                    <div>
                      <p class="text-sm text-stone-500 dark:text-stone-400">Selisih Harga</p>
                      <p class="font-bold ${instrument.currentPrice >= averagePrice ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400"}">
                        ${instrument.currentPrice >= averagePrice ? "+" : ""}Rp ${formatCurrency(Math.abs(instrument.currentPrice - averagePrice))}
                      </p>
                    </div>
                    <div>
                      <p class="text-sm text-stone-500 dark:text-stone-400">% Perubahan</p>
                      <p class="font-bold ${instrument.currentPrice >= averagePrice ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400"}">
                        ${instrument.currentPrice >= averagePrice ? "+" : ""}${averagePrice > 0 ? (((instrument.currentPrice - averagePrice) / averagePrice) * 100).toFixed(2) : "0.00"}%
                      </p>
                    </div>
                  </div>
                </div>
              </div>
              
              <!-- Notes & Actions -->
              <div class="space-y-4">
                <div class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl">
                  <h4 class="font-bold text-blue-800 dark:text-blue-300 mb-2">Catatan</h4>
                  <p class="text-sm text-blue-700 dark:text-blue-400">${instrument.notes || "Tidak ada catatan"}</p>
                </div>
                
                <div class="p-4 bg-stone-50 dark:bg-stone-800 rounded-xl">
                  <h4 class="font-bold text-stone-800 dark:text-white mb-3">Aksi Cepat</h4>
                  <div class="space-y-2">
                    <button onclick="showAddPurchaseModal(${instrument.id})" class="w-full py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm transition-colors">
                      <i class="fa-solid fa-plus mr-2"></i>Tambah Pembelian
                    </button>
                    <button onclick="showUpdatePriceModal(${instrument.id})" class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm transition-colors">
                      <i class="fa-solid fa-sync-alt mr-2"></i>Update Harga
                    </button>
                  </div>
                </div>
              </div>
            </div>
            
            <!-- Purchase History -->
            <div class="border-t border-stone-200 dark:border-stone-800 pt-6">
              <h4 class="font-bold text-stone-800 dark:text-white mb-4">Riwayat Pembelian</h4>
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead>
                    <tr class="border-b border-stone-200 dark:border-stone-700">
                      <th class="text-left py-2 text-stone-600 dark:text-stone-400 font-medium">Tanggal</th>
                      <th class="text-left py-2 text-stone-600 dark:text-stone-400 font-medium">Jumlah (Rp)</th>
                      <th class="text-left py-2 text-stone-600 dark:text-stone-400 font-medium">Kuantitas</th>
                      <th class="text-left py-2 text-stone-600 dark:text-stone-400 font-medium">Harga/Unit</th>
                      <th class="text-left py-2 text-stone-600 dark:text-stone-400 font-medium">Nilai Sekarang</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${instrument.purchases
                      .map((purchase) => {
                        const currentValue = purchase.quantity * instrument.currentPrice;
                        const profit = currentValue - purchase.amount;
                        const profitPercentage = (profit / purchase.amount) * 100;

                        return `
                        <tr class="border-b border-stone-100 dark:border-stone-800 hover:bg-stone-50 dark:hover:bg-stone-800">
                          <td class="py-3">${formatDateShort(purchase.date)}</td>
                          <td class="py-3 font-medium">Rp ${formatCurrency(purchase.amount)}</td>
                          <td class="py-3">${purchase.quantity} ${instrument.symbol}</td>
                          <td class="py-3">Rp ${formatCurrency(purchase.pricePerUnit)}</td>
                          <td class="py-3">
                            <div class="font-medium">Rp ${formatCurrency(currentValue)}</div>
                            <div class="text-xs ${profit >= 0 ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400"}">
                              ${profit >= 0 ? "+" : ""}${profitPercentage.toFixed(1)}%
                            </div>
                          </td>
                        </tr>
                      `;
                      })
                      .join("")}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        `;

        document.body.appendChild(modal);
      }

      function initInvestmentChart() {
        const ctx = document.getElementById("investmentChart");
        if (!ctx) return;

        const instruments = appData.investmentData.instruments;
        const labels = instruments.map((inv) => inv.symbol);
        const profits = instruments.map((inv) => inv.profitLossPercentage);
        const colors = instruments.map((inv) => (inv.profitLoss >= 0 ? "#10b981" : "#ef4444"));

        new Chart(ctx.getContext("2d"), {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Return (%)",
                data: profits,
                backgroundColor: colors,
                borderRadius: 6,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  callback: function (value) {
                    return value + "%";
                  },
                },
              },
            },
            plugins: {
              legend: {
                display: false,
              },
            },
          },
        });
      }

      // --- MODAL FUNCTIONS (simplified) ---

      function showAddAssetModal(type) {
        alert(`Fitur tambah aset ${type} akan ditampilkan di sini`);
      }

      function showAddDebtModal() {
        alert("Fitur tambah hutang akan ditampilkan di sini");
      }

      function showAddInvestmentModal() {
        alert("Fitur tambah investasi akan ditampilkan di sini");
      }

      function showAddPurchaseModal(instrumentId) {
        alert(`Fitur tambah pembelian untuk investasi ID ${instrumentId} akan ditampilkan di sini`);
      }

      function showUpdatePriceModal(investmentId) {
        alert(`Fitur update harga untuk investasi ID ${investmentId} akan ditampilkan di sini`);
      }

      function addPurchase() {
        alert("Fitur tambah pembelian akan ditampilkan di sini");
      }
      // --- INIT ---
      window.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
